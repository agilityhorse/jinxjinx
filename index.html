<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JinxJinx! You owe me a Coke.</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PNQHG98VS7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-PNQHG98VS7');
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:  #a855f7;
      --yellow:  #f59e0b;
      --dark:    #020617;
      --white:   #f8fafc;
      --muted:   #94a3b8;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-blobs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.25; }
    .blob-1 { width: 500px; height: 500px; background: var(--purple); top: -120px; left: -100px; }
    .blob-2 { width: 400px; height: 400px; background: var(--yellow); top: 40%; right: -120px; }
    .blob-3 { width: 350px; height: 350px; background: var(--purple); bottom: -80px; left: 30%; opacity: 0.15; }

    .container { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 0 24px; }

    header {
      position: relative; z-index: 10;
      padding: 28px 24px 0;
      max-width: 860px; margin: 0 auto;
      display: flex; align-items: center; justify-content: center;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }

    .logo-mark {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 14px;
      background: #f8fafc;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(168,85,247,.35);
    }
    .logo-mark svg { width: 26px; height: 26px; }
    .logo-name {
      font-family: 'Baloo 2', cursive; font-weight: 800;
      font-size: clamp(1.5rem, 4vw, 2rem); letter-spacing: -0.03em;
      background: linear-gradient(90deg, var(--white) 0%, #d8b4fe 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .hero { padding: clamp(56px, 10vw, 100px) 0 clamp(40px, 8vw, 72px); text-align: center; }

    h1 {
      font-family: 'Baloo 2', cursive; font-weight: 800;
      font-size: clamp(2.4rem, 7vw, 4.2rem); line-height: 1.1;
      letter-spacing: -0.03em; margin-bottom: 24px;
      animation: fadeUp .7s .1s ease both;
    }
    h1 .accent  { color: var(--purple); }
    h1 .accent2 { color: var(--yellow); }

    .hero-desc {
      font-size: clamp(1rem, 2.5vw, 1.2rem); color: var(--muted);
      max-width: 560px; margin: 0 auto 48px; line-height: 1.7; font-weight: 600;
      animation: fadeUp .7s .2s ease both;
    }

    .form-wrap { max-width: 500px; margin: 0 auto; animation: fadeUp .7s .3s ease both; }
    .form-row  { display: flex; gap: 10px; flex-wrap: wrap; }

    .form-row input[type="email"] {
      flex: 1 1 220px; min-width: 0;
      background: rgba(248,250,252,.06); border: 1.5px solid rgba(248,250,252,.15);
      border-radius: 14px; color: var(--white);
      font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 600;
      padding: 14px 20px; outline: none;
      transition: border-color .2s, background .2s;
    }
    .form-row input[type="email"]::placeholder { color: var(--muted); }
    .form-row input[type="email"]:focus { border-color: var(--purple); background: rgba(168,85,247,.1); }

    .btn-primary {
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--purple), #7c3aed);
      border: none; border-radius: 14px; color: #fff; cursor: pointer;
      font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 1.05rem;
      padding: 14px 28px; white-space: nowrap;
      transition: transform .15s, box-shadow .2s;
      box-shadow: 0 6px 24px rgba(168,85,247,.4);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(168,85,247,.55); }
    .btn-primary:active { transform: translateY(0); }

    .form-note { font-size: 13px; color: var(--muted); margin-top: 12px; font-weight: 600; }

    .success-msg {
      display: none;
      background: rgba(168,85,247,.15); border: 1.5px solid rgba(168,85,247,.4);
      border-radius: 14px; padding: 18px 24px;
      font-weight: 700; font-size: 1rem; color: #d8b4fe;
      animation: fadeUp .4s ease both;
    }

    footer {
      position: relative; z-index: 1;
      border-top: 1px solid rgba(248,250,252,.07);
      padding: 28px 24px; text-align: center;
      font-size: 13px; color: var(--muted); font-weight: 600;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--white); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      header { padding: 20px 20px 0; }
      .container { padding: 0 20px; }
      .hero { padding: 44px 0 36px; }
      h1 { font-size: 2.2rem; margin-bottom: 18px; }
      .hero-desc { font-size: 1rem; margin-bottom: 36px; }
      .lang-switcher { display: none; }
      .form-row { flex-direction: column; gap: 10px; }
      .form-row input[type="email"] { width: 100%; font-size: 15px; padding: 12px 16px; }
      .btn-primary { width: 100%; text-align: center; font-size: 0.95rem; padding: 12px; }
      .form-note { font-size: 12px; text-align: center; }
      .success-msg { font-size: 0.95rem; text-align: center; }
      footer { padding: 24px 20px; font-size: 12px; }
      .logo-name { font-size: 1.6rem; }
    }

    @media (min-width: 601px) and (max-width: 860px) {
      header { padding: 24px 24px 0; }
      h1 { font-size: clamp(2rem, 6vw, 3rem); }
      .form-row input[type="email"] { font-size: 16px; }
    }
  </style>
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<header>
  <div class="header-left">
    <div class="logo-mark">
      <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <clipPath id="cl"><rect x="0" y="0" width="22" height="44"/></clipPath>
        <clipPath id="cr"><rect x="22" y="0" width="22" height="44"/></clipPath>
        <circle cx="22" cy="22" r="20" fill="#f59e0b" clip-path="url(#cl)"/>
        <circle cx="22" cy="22" r="20" fill="#a855f7" clip-path="url(#cr)"/>
        <circle cx="22" cy="12" r="10" fill="#a855f7"/>
        <circle cx="22" cy="32" r="10" fill="#f59e0b"/>
        <circle cx="22" cy="12" r="3.5" fill="#f59e0b"/>
        <circle cx="22" cy="32" r="3.5" fill="#a855f7"/>
        <circle cx="22" cy="22" r="20" fill="none" stroke="rgba(2,6,23,0.15)" stroke-width="1"/>
      </svg>
    </div>
    <span class="logo-name">JinxJinx</span>
  </div>
</header>

<main>
  <section class="hero container">
    <h1 id="hero-title"></h1>
    <p class="hero-desc" id="hero-desc"></p>
    <div class="form-wrap">
      <div class="form-row" id="email-form">
        <input type="email" id="email-input" autocomplete="email" />
        <button class="btn-primary" id="btn-notify" onclick="handleSubmit()"></button>
      </div>
      <p class="form-note" id="form-note"></p>
      <div class="success-msg" id="success-msg"></div>
    </div>
  </section>
</main>

<footer>
  <p id="footer-text"></p>
</footer>

<script>
const i18n = {
  pl: {
    title:       'Kt\u00f3ry znajomy my\u015bli <span class="accent">tak samo</span> jak <span class="accent2">Ty?</span>',
    desc:        'JinxJinx sprawdza, kt\u00f3ry z Twoich znajomych my\u015bli dok\u0142adnie tak samo jak Ty. Odpowiadajcie na te same pytania i przekonajcie si\u0119, kto jest Waszym my\u015blowym bli\u017aniakiem.',
    placeholder: 'Tw\u00f3j adres e-mail',
    btn:         'Powiadom mnie',
    note:        'Damy Ci zna\u0107 jako pierwszemu, gdy b\u0119dziemy gotowi. Zero spamu. \uD83E\uDD1E',
    success:     '\u2713 Gotowe! Odezwiemy si\u0119, gdy tylko wystartujemy. \uD83C\uDF89',
    footer:      '\u00a9 2025 JinxJinx. Wszelkie prawa zastrze\u017cone.',
  },
  en: {
    title:       'Which friend thinks <span class="accent">just like</span> <span class="accent2">you?</span>',
    desc:        'JinxJinx finds out which of your friends thinks exactly the same way as you. Answer the same questions and discover your mind twin.',
    placeholder: 'Your email address',
    btn:         'Notify me',
    note:        "We\u2019ll let you know as soon as we\u2019re ready. No spam. \uD83E\uDD1E",
    success:     "\u2713 Done! We\u2019ll reach out when we launch. \uD83C\uDF89",
    footer:      '\u00a9 2025 JinxJinx. All rights reserved.',
  },
  de: {
    title:       'Welcher Freund denkt <span class="accent">genauso</span> wie <span class="accent2">du?</span>',
    desc:        'JinxJinx findet heraus, welcher deiner Freunde genau wie du denkt. Beantwortet dieselben Fragen und entdeckt euren Gedankenzwilling.',
    placeholder: 'Deine E-Mail-Adresse',
    btn:         'Benachrichtige mich',
    note:        'Wir informieren dich als Erstes, wenn wir bereit sind. Kein Spam. \uD83E\uDD1E',
    success:     '\u2713 Geschafft! Wir melden uns beim Launch. \uD83C\uDF89',
    footer:      '\u00a9 2025 JinxJinx. Alle Rechte vorbehalten.',
  },
  es: {
    title:       '\u00bfQu\u00e9 amigo piensa <span class="accent">igual</span> que <span class="accent2">t\u00fa?</span>',
    desc:        'JinxJinx descubre cu\u00e1l de tus amigos piensa exactamente igual que t\u00fa. Responded las mismas preguntas y encontrad vuestro gemelo mental.',
    placeholder: 'Tu direcci\u00f3n de correo',
    btn:         'Av\u00edsarme',
    note:        'Te avisaremos en cuanto estemos listos. Sin spam. \uD83E\uDD1E',
    success:     '\u2713 \u00a1Listo! Te escribiremos cuando lancemos. \uD83C\uDF89',
    footer:      '\u00a9 2025 JinxJinx. Todos los derechos reservados.',
  },
  fr: {
    title:       'Quel ami pense <span class="accent">exactement</span> comme <span class="accent2">toi?</span>',
    desc:        'JinxJinx d\u00e9couvre lequel de tes amis pense exactement comme toi. R\u00e9pondez aux m\u00eames questions et trouvez votre jumeau de pens\u00e9e.',
    placeholder: 'Ton adresse e-mail',
    btn:         'Me pr\u00e9venir',
    note:        "On te pr\u00e9vient d\u00e8s qu\u2019on est pr\u00eat. Z\u00e9ro spam. \uD83E\uDD1E",
    success:     "✓ C\u2019est fait\u00a0! On te contacte au lancement. \uD83C\uDF89",
    footer:      '\u00a9 2025 JinxJinx. Tous droits r\u00e9serv\u00e9s.',
  },
  sv: {
    title:       'Vilken v\u00e4n t\u00e4nker <span class="accent">precis</span> som <span class="accent2">du?</span>',
    desc:        'JinxJinx tar reda p\u00e5 vilken av dina v\u00e4nner som t\u00e4nker exakt likadant som du. Svara p\u00e5 samma fr\u00e5gor och hitta din tankekilling.',
    placeholder: 'Din e-postadress',
    btn:         'Meddela mig',
    note:        'Vi h\u00f6r av oss s\u00e5 fort vi \u00e4r redo. Ingen skr\u00e4ppost. \uD83E\uDD1E',
    success:     '\u2713 Klart! Vi kontaktar dig n\u00e4r vi lanserar. \uD83C\uDF89',
    footer:      '\u00a9 2025 JinxJinx. Alla r\u00e4ttigheter f\u00f6rbeh\u00e5llna.',
  }
};

function detectLang() {
  const nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase().slice(0, 2);
  return ['pl','en','de','es','fr','sv'].includes(nav) ? nav : 'en';
}

function setLang(lang) {
  const t = i18n[lang];
  document.documentElement.lang = lang;
  document.getElementById('hero-title').innerHTML    = t.title;
  document.getElementById('hero-desc').textContent   = t.desc;
  document.getElementById('email-input').placeholder = t.placeholder;
  document.getElementById('btn-notify').textContent  = t.btn;
  document.getElementById('form-note').textContent   = t.note;
  document.getElementById('success-msg').innerHTML   = t.success;
  document.getElementById('footer-text').innerHTML   = t.footer;
}

async function handleSubmit() {
  const input = document.getElementById('email-input');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value.trim())) {
    input.style.borderColor = '#a855f7';
    input.focus();
    setTimeout(() => input.style.borderColor = '', 1200);
    return;
  }
  const btn = document.getElementById('btn-notify');
  btn.disabled = true;
  btn.style.opacity = '0.7';
  try {
    await fetch('https://script.google.com/macros/s/AKfycbxmuxR2oVWa07HmbFzDjQ-WwylOjrVfUW6pk65zeyyj39w9UJvcGZDc68WIdk7fKj2p/exec', {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: input.value.trim() })
    });
  } catch(e) {}
  document.getElementById('email-form').style.display  = 'none';
  document.getElementById('form-note').style.display   = 'none';
  document.getElementById('success-msg').style.display = 'block';
}

document.getElementById('email-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSubmit();
});

setLang(detectLang());
</script>
</body>
</html>
